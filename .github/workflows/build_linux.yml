on:
  pull_request:
    paths:
      - '**/*.sh'
      - 'linux/**'
      - 'gui/**'
      - '.github/workflows/build_linux.yml'
      - 'CMakeLists.txt'
  push:
    paths:
      - '**/*.sh'
      - 'linux/**'
      - 'gui/**'
      - '.github/workflows/build_linux.yml'
      - 'CMakeLists.txt'
  workflow_dispatch:

name: Build ZeroTier One Linux

jobs:
  build_ubuntu:
    runs-on: ubuntu-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf input
    - name: checkout
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-unknown-linux-gnu
        components: rustfmt, clippy

    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits/Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/

    - name: make
      run: make
    - name: selftest
      run: |
        make selftest
        ./zerotier-selftest
    - name: 'Tar files' # keeps permissions (execute)
      run: tar -cvf zerotier-one.tar zerotier-one
    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-one-ubuntu-x64
        path: zerotier-one.tar
        retention-days: 7

  build_gui_ubuntu:
    runs-on: ubuntu-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf input
    - name: checkout
      uses: actions/checkout@v4
    
    - name: Install Qt6 and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qt6-base-dev qt6-tools-dev cmake build-essential libssl-dev
    
    - name: Install AppImage tools
      run: |
        # Download linuxdeploy for AppImage creation
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy
        echo "linuxdeploy installed for AppImage creation"
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-unknown-linux-gnu
        components: rustfmt, clippy

    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits/Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/

    - name: Build core ZeroTier
      run: make

    - name: Build GUI
      run: |
        echo "Building GUI with CMake..."
        
        # Create build directory
        mkdir -p build
        cd build
        
        # Configure with CMake
        cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_GUI=ON
        
        if [ $? -ne 0 ]; then
            echo "CMake configuration failed!"
            exit 1
        fi
        
        # Build the GUI
        cmake --build . --config Release --target zerotier-gui -j$(nproc)
        
        if [ $? -ne 0 ]; then
            echo "GUI build failed!"
            exit 1
        fi
        
        # Create deploy directory and copy executable
        mkdir -p deploy
        if [ -f "gui/zerotier-gui" ]; then
            cp gui/zerotier-gui deploy/
            echo "GUI executable created successfully"
        elif [ -f "gui/Release/zerotier-gui" ]; then
            cp gui/Release/zerotier-gui deploy/
            echo "GUI executable created successfully"
        else
            echo "GUI executable not found!"
            find . -name "*zerotier-gui*" -type f
            exit 1
        fi
        
        cd ..

    - name: Package GUI
      run: |
        mkdir -p zerotier-gui-package
        
        # Check for the built executable
        if [ -f "build/deploy/zerotier-gui" ]; then
          echo "Packaging GUI executable..."
          cp build/deploy/zerotier-gui zerotier-gui-package/ZeroTierOneGUI
          
          # Make executable
          chmod +x zerotier-gui-package/ZeroTierOneGUI
          
          # Copy desktop file and icon if they exist
          if [ -f "gui/resources/linux/zerotier-one.desktop" ]; then
            cp gui/resources/linux/zerotier-one.desktop zerotier-gui-package/
          fi
          if [ -f "artwork/ZeroTierIcon.png" ]; then
            cp artwork/ZeroTierIcon.png zerotier-gui-package/zerotier.png
          fi
          
          # Create README
          echo "ZeroTier One GUI for Linux" > zerotier-gui-package/README.txt
          echo "Usage: ./ZeroTierOneGUI" >> zerotier-gui-package/README.txt
          echo "Requires Qt6 to be installed on target systems." >> zerotier-gui-package/README.txt
        else
          echo "Error: No GUI executable found!"
          exit 1
        fi
        
        tar -cvf zerotier-gui-ubuntu.tar zerotier-gui-package/

    - name: Archive GUI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-gui-ubuntu-x64
        path: zerotier-gui-ubuntu.tar
        retention-days: 7
