on:
  pull_request:
    paths:
      - '**/*.bat'
      - 'windows/**'
      - 'gui/**'
      - '.github/workflows/build_windows.yml'
      - 'CMakeLists.txt'
  push:
    paths:
      - '**/*.bat'
      - 'windows/**'
      - 'gui/**'
      - '.github/workflows/build_windows.yml'
      - 'CMakeLists.txt'
  workflow_dispatch:

name: Build ZeroTier One Windows

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf true
    - name: checkout
      uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: x86_64-pc-windows-msvc
        components: rustfmt, clippy
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits/Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/

    - name: setup msbuild
      uses: microsoft/setup-msbuild@v2
    - name: msbuild
      run: |
        msbuild windows\ZeroTierOne.sln /m /p:Configuration=Release /property:Platform=x64 /t:ZeroTierOne /p:DisableSpecificWarnings="4005"
    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-one-windows
        path: windows/Build
        retention-days: 7

  build_gui_windows:
    runs-on: windows-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf true
    - name: checkout
      uses: actions/checkout@v4
    
    - name: Install Qt6
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        tools: 'tools_cmake'
        
    - name: Set Qt environment variables
      shell: powershell
      run: |
        Write-Host "Setting up Qt environment variables..."
        
        # The install-qt-action sets Qt6_DIR automatically
        $qtPath = $env:Qt6_DIR
        Write-Host "Qt6_DIR from action: $qtPath"
        
        if (-not $qtPath -or -not (Test-Path $qtPath)) {
            # Try to find Qt in common locations
            $commonPaths = @(
                "$env:RUNNER_TOOL_CACHE\Qt\6.5.0\msvc2019_64",
                "$env:RUNNER_TOOL_CACHE\Qt\6.5.0\msvc2022_64",
                "C:\Qt\6.5.0\msvc2019_64",
                "C:\Qt\6.5.0\msvc2022_64"
            )
            
            foreach ($path in $commonPaths) {
                if (Test-Path $path) {
                    $qtPath = $path
                    Write-Host "Found Qt at fallback location: $qtPath"
                    break
                }
            }
        }
        
        if ($qtPath -and (Test-Path $qtPath)) {
            Write-Host "Using Qt installation at: $qtPath"
            
            # Set QT_DIR for future steps
            echo "QT_DIR=$qtPath" >> $env:GITHUB_ENV
            
            # Set QT_DIR for current session
            $env:QT_DIR = $qtPath
            
            # Verify Qt tools exist
            $qmakePath = "$qtPath\bin\qmake.exe"
            $cmakePath = "$qtPath\bin\cmake.exe"
            $windeployqtPath = "$qtPath\bin\windeployqt.exe"
            
            Write-Host "Qt tools check:"
            Write-Host "  qmake: $(if (Test-Path $qmakePath) { 'Found' } else { 'Missing' })"
            Write-Host "  cmake: $(if (Test-Path $cmakePath) { 'Found' } else { 'Missing' })"
            Write-Host "  windeployqt: $(if (Test-Path $windeployqtPath) { 'Found' } else { 'Missing' })"
            
        } else {
            Write-Host "ERROR: Qt6 installation not found!"
            Write-Host "Searched paths:"
            foreach ($path in $commonPaths) {
                Write-Host "  $path - $(if (Test-Path $path) { 'Found' } else { 'Not found' })"
            }
            exit 1
        }
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: x86_64-pc-windows-msvc
        components: rustfmt, clippy
        
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits/Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/

    - name: setup msbuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Build core ZeroTier
      run: |
        msbuild windows\ZeroTierOne.sln /m /p:Configuration=Release /property:Platform=x64 /t:ZeroTierOne /p:DisableSpecificWarnings="4005"

    - name: Setup GUI build environment
      run: |
        ./setup-gui-build.sh
      shell: bash

    - name: Build GUI
      shell: powershell
      run: |
        Write-Host "Starting GUI build with detailed logging..."
        Write-Host "Environment variables:"
        Write-Host "QT_DIR: $env:QT_DIR"
        Write-Host "Qt6_DIR: $env:Qt6_DIR"
        Write-Host "PATH contains Qt: $($env:PATH -split ';' | Where-Object { $_ -like '*Qt*' })"
        
        Write-Host "Checking Qt installation..."
        if ($env:QT_DIR -and (Test-Path "$env:QT_DIR")) {
            Write-Host "Qt6 found at: $env:QT_DIR"
            Get-ChildItem -Path "$env:QT_DIR\bin" -ErrorAction SilentlyContinue | Select-Object Name | Format-Table -AutoSize
        } else {
            Write-Host "QT_DIR not set or path does not exist!"
            Write-Host "Available Qt installations:"
            Get-ChildItem -Path "C:\" -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*Qt*" } | Select-Object FullName
        }
        
        # Setup Visual Studio environment
        Write-Host "Setting up Visual Studio environment..."
        $vsPath = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat"
        if (-not (Test-Path $vsPath)) {
            $vsPath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2019\Enterprise\Common7\Tools\VsDevCmd.bat"
        }
        if (Test-Path $vsPath) {
            Write-Host "Found Visual Studio at: $vsPath"
        } else {
            Write-Host "Visual Studio not found!"
        }
        
        # Create a proper CMake build
        Write-Host "Setting up CMake build..."
        if (-not (Test-Path "build")) {
            New-Item -Path "build" -ItemType Directory
        }
        Set-Location "build"
        
        # Configure with CMake
        Write-Host "Configuring with CMake..."
        $cmakeCmd = "cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_GUI=ON -G `"Visual Studio 17 2022`" -A x64"
        if ($env:QT_DIR) {
            $cmakeCmd += " -DCMAKE_PREFIX_PATH=`"$env:QT_DIR`""
        }
        
        Write-Host "CMake command: $cmakeCmd"
        Invoke-Expression $cmakeCmd
        
        if ($LASTEXITCODE -eq 0) {
            Write-Host "CMake configuration successful"
            
            # Build the project
            Write-Host "Building GUI with CMake..."
            cmake --build . --config Release --target zerotier-gui --verbose
            
            if ($LASTEXITCODE -eq 0) {
                Write-Host "GUI build successful!"
                
                # Find the executable
                $exeLocations = @(
                    "gui\Release\zerotier-gui.exe",
                    "gui\Release\ZeroTier One.exe",
                    "Release\zerotier-gui.exe",
                    "Release\ZeroTier One.exe"
                )
                
                $found = $false
                foreach ($location in $exeLocations) {
                    if (Test-Path $location) {
                        Write-Host "Found GUI executable at: $location"
                        $found = $true
                        
                        # Create deploy directory
                        if (-not (Test-Path "deploy")) {
                            New-Item -Path "deploy" -ItemType Directory
                        }
                        
                        # Copy executable
                        Copy-Item -Path $location -Destination "deploy\zerotier-gui.exe"
                        
                        # Deploy Qt dependencies if windeployqt is available
                        if ($env:QT_DIR -and (Test-Path "$env:QT_DIR\bin\windeployqt.exe")) {
                            Write-Host "Deploying Qt dependencies..."
                            & "$env:QT_DIR\bin\windeployqt.exe" "deploy\zerotier-gui.exe"
                        }
                        break
                    }
                }
                
                if (-not $found) {
                    Write-Host "GUI executable not found in expected locations"
                    Write-Host "Available files in build directory:"
                    Get-ChildItem -Recurse -File *.exe | Select-Object FullName
                    throw "GUI executable not found"
                }
            } else {
                Write-Host "GUI build failed"
                throw "CMake build failed"
            }
        } else {
            Write-Host "CMake configuration failed"
            throw "CMake configuration failed"
        }
        
        Set-Location ".."

    - name: Package GUI
      run: |
        Write-Host "Packaging GUI executable..."
        
        # Check for the built executable
        if (Test-Path "build\deploy\zerotier-gui.exe") {
            Write-Host "Found GUI executable at: build\deploy\zerotier-gui.exe"
            
            # Create output directory if it doesn't exist
            if (-not (Test-Path "package")) {
              New-Item -Path "package" -ItemType Directory
            }
            
            # Copy all files from deploy directory
            Write-Host "Packaging executable with Qt dependencies..."
            Copy-Item -Path "build\deploy\*" -Destination "package" -Recurse
            Compress-Archive -Path "package\*" -DestinationPath "zerotier-gui-windows.zip" -Force
            Write-Host "Package created: zerotier-gui-windows.zip"
        } else {
            Write-Host "Error: No GUI executable found!"
            Write-Host "Listing build directory contents for debugging:"
            Get-ChildItem -Recurse -Path "build" -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
        }

    - name: Archive GUI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-gui-windows
        path: zerotier-gui-windows.zip
        retention-days: 7
