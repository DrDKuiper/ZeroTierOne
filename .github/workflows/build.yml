on:
  pull_request:
  push:
  workflow_dispatch:

name: Build ZeroTier One (Core + GUI)

jobs:
  build_ubuntu:
    runs-on: ubuntu-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf input
      #        git config --global core.eol lf
    - name: checkout
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-unknown-linux-gnu
        components: rustfmt, clippy

    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits//Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/

    - name: make
      run: make
    - name: selftest
      run: |
        make selftest
        ./zerotier-selftest
    - name: 'Tar files' # keeps permissions (execute)
      run: tar -cvf zerotier-one.tar zerotier-one
    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-one-ubuntu-x64
        path: zerotier-one.tar
        retention-days: 7

  build_macos:
    runs-on: macos-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf input
      #        git config --global core.eol lf
    - name: checkout
      uses: actions/checkout@v4
    - name: Install Rust aarch64
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: aarch64-apple-darwin
        components: rustfmt, clippy
    - name: Install Rust x86_64
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: x86_64-apple-darwin
        components: rustfmt, clippy
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits//Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/
    - name: make
      run: make
    - name: selftest
      run: |
        make selftest
        ./zerotier-selftest
    - name: 'Tar files' # keeps permissions (execute)
      run: tar -cvf zerotier-one.tar zerotier-one
    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-one-mac
        path: zerotier-one.tar
        retention-days: 7


  build_windows:
    runs-on: windows-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf true
      #        git config --global core.eol lf
    - name: checkout
      uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: aarch64-apple-darwin
        components: rustfmt, clippy
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits//Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/

    - name: setup msbuild
      uses: microsoft/setup-msbuild@v2
    - name: msbuild
      run: |
        msbuild windows\ZeroTierOne.sln /m /p:Configuration=Release  /property:Platform=x64 /t:ZeroTierOne
    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-one-windows
        path: windows/Build
        retention-days: 7

  build_gui_ubuntu:
    runs-on: ubuntu-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf input
    - name: checkout
      uses: actions/checkout@v4
    
    - name: Install Qt6 and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qt6-base-dev qt6-tools-dev cmake build-essential libssl-dev
    
    - name: Install AppImage tools
      run: |
        # Download linuxdeploy for AppImage creation
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy
        echo "linuxdeploy installed for AppImage creation"
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-unknown-linux-gnu
        components: rustfmt, clippy

    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits//Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/

    - name: Build core ZeroTier
      run: make

    - name: Setup GUI build environment
      run: |
        chmod +x setup-gui-build.sh
        ./setup-gui-build.sh

    - name: Build GUI
      run: |
        chmod +x build-gui-linux.sh
        ./build-gui-linux.sh

    - name: Package GUI
      run: |
        mkdir -p zerotier-gui-package
        
        # Check for AppImage first (preferred standalone format)
        if [ -f "build/deploy/ZeroTierOneGUI.AppImage" ]; then
          echo "Packaging standalone AppImage..."
          cp build/deploy/ZeroTierOneGUI.AppImage zerotier-gui-package/
          echo "Standalone AppImage created: ZeroTierOneGUI.AppImage" > zerotier-gui-package/README.txt
          echo "This file contains all dependencies and runs on any Linux system." >> zerotier-gui-package/README.txt
          echo "Usage: chmod +x ZeroTierOneGUI.AppImage && ./ZeroTierOneGUI.AppImage" >> zerotier-gui-package/README.txt
        elif [ -f "build/deploy/ZeroTierOneGUI" ]; then
          echo "Packaging standalone executable..."
          cp build/deploy/ZeroTierOneGUI zerotier-gui-package/
          cp gui/resources/linux/zerotier-one.desktop zerotier-gui-package/
          cp artwork/ZeroTierIcon.png zerotier-gui-package/zerotier.png
          echo "Standalone executable created: ZeroTierOneGUI" > zerotier-gui-package/README.txt
          echo "May require Qt6 to be installed on target systems." >> zerotier-gui-package/README.txt
        elif [ -f "build/gui/zerotier-gui" ]; then
          echo "Packaging basic executable..."
          cp build/gui/zerotier-gui zerotier-gui-package/ZeroTierOneGUI
          cp gui/resources/linux/zerotier-one.desktop zerotier-gui-package/
          cp artwork/ZeroTierIcon.png zerotier-gui-package/zerotier.png
          echo "Basic executable created: ZeroTierOneGUI" > zerotier-gui-package/README.txt
          echo "Requires Qt6 to be installed on target systems." >> zerotier-gui-package/README.txt
        else
          echo "Error: No GUI executable found!"
          exit 1
        fi
        
        tar -cvf zerotier-gui-ubuntu.tar zerotier-gui-package/

    - name: Archive GUI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-gui-ubuntu-x64
        path: zerotier-gui-ubuntu.tar
        retention-days: 7

  build_gui_macos:
    runs-on: macos-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf input
    - name: checkout
      uses: actions/checkout@v4
    
    - name: Install Qt6 and dependencies
      run: |
        # Check if cmake is working
        if command -v cmake >/dev/null 2>&1; then
          echo "CMake is already available: $(cmake --version | head -1)"
        else
          echo "Installing CMake..."
          brew install cmake
        fi
        
        # Install Qt6
        echo "Installing Qt6..."
        brew install qt6
    
    - name: Install Rust aarch64
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: aarch64-apple-darwin
        components: rustfmt, clippy
    - name: Install Rust x86_64
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: x86_64-apple-darwin
        components: rustfmt, clippy
        
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits//Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/

    - name: Build core ZeroTier
      run: make

    - name: Setup GUI build environment  
      run: |
        chmod +x setup-gui-build.sh
        ./setup-gui-build.sh

    - name: Build GUI
      run: |
        chmod +x build-gui-macos.sh
        ./build-gui-macos.sh

    - name: Package GUI
      run: |
        # Package the standalone app bundle created by build script
        if [ -d "build/deploy/ZeroTierOneGUI.app" ]; then
          tar -cvf zerotier-gui-macos.tar build/deploy/ZeroTierOneGUI.app
          echo "Packaged standalone app bundle: build/deploy/ZeroTierOneGUI.app"
        elif [ -d "build/gui/ZeroTier One.app" ]; then
          tar -cvf zerotier-gui-macos.tar build/gui/"ZeroTier One.app"
          echo "Packaged basic app bundle: build/gui/ZeroTier One.app"
        else
          echo "Error: No app bundle found!"
          exit 1
        fi

    - name: Archive GUI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-gui-macos
        path: zerotier-gui-macos.tar
        retention-days: 7

  build_gui_windows:
    runs-on: windows-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf true
    - name: checkout
      uses: actions/checkout@v4
    
    - name: Install Qt6
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtbase qttools'
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: x86_64-pc-windows-msvc
        components: rustfmt, clippy
        
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits//Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/

    - name: setup msbuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Build core ZeroTier
      run: |
        msbuild windows\ZeroTierOne.sln /m /p:Configuration=Release  /property:Platform=x64 /t:ZeroTierOne

    - name: Setup GUI build environment
      run: |
        ./setup-gui-build.sh
      shell: bash

    - name: Build GUI
      run: |
        .\build-gui-windows.bat
      continue-on-error: true # Allow this to fail if Qt6 setup has issues

    - name: Package GUI
      run: |
        if (Test-Path "build\deploy\ZeroTierOneGUI.exe") {
          Write-Host "Packaging standalone executable with dependencies..."
          Compress-Archive -Path "build\deploy\*" -DestinationPath "zerotier-gui-windows.zip"
          Write-Host "Standalone package created: zerotier-gui-windows.zip"
        } elseif (Test-Path "build\gui\Release\ZeroTier One.exe") {
          Write-Host "Packaging basic executable..."
          Compress-Archive -Path "build\gui\Release\*" -DestinationPath "zerotier-gui-windows.zip"
          Write-Host "Basic package created: zerotier-gui-windows.zip"
        } else {
          Write-Host "Error: No GUI executable found!"
          exit 1
        }
      if: success() # Only package if GUI build succeeded

    - name: Archive GUI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-gui-windows
        path: zerotier-gui-windows.zip
        retention-days: 7
      if: success() # Only upload if GUI build succeeded
