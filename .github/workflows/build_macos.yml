on:
  pull_request:
    paths:
      - '**/*.sh'
      - 'mac/**'
      - 'osdep/*Mac*'
      - 'gui/**'
      - '.github/workflows/build_macos.yml'
      - 'CMakeLists.txt'
  push:
    paths:
      - '**/*.sh'
      - 'mac/**'
      - 'osdep/*Mac*'
      - 'gui/**'
      - '.github/workflows/build_macos.yml'
      - 'CMakeLists.txt'
  workflow_dispatch:

name: Build ZeroTier One macOS

jobs:
  build_macos:
    runs-on: macos-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf input
    - name: checkout
      uses: actions/checkout@v4
    - name: Install Rust aarch64
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: aarch64-apple-darwin
        components: rustfmt, clippy
    - name: Install Rust x86_64
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: x86_64-apple-darwin
        components: rustfmt, clippy
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits/Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/
    - name: make
      run: make
    - name: selftest
      run: |
        make selftest
        ./zerotier-selftest
    - name: 'Tar files' # keeps permissions (execute)
      run: tar -cvf zerotier-one.tar zerotier-one
    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-one-mac
        path: zerotier-one.tar
        retention-days: 7

  build_gui_macos:
    runs-on: macos-latest
    steps:
    - name: gitconfig
      run: |
        git config --global core.autocrlf input
    - name: checkout
      uses: actions/checkout@v4
    
    - name: Install Qt6 and dependencies
      run: |
        # Check if cmake is working
        if command -v cmake >/dev/null 2>&1; then
          echo "CMake is already available: $(cmake --version | head -1)"
        else
          echo "Installing CMake..."
          brew install cmake
        fi
    
    - name: Install Qt6
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0'
        host: 'mac'
        target: 'desktop'
    
    - name: Install Rust aarch64
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: aarch64-apple-darwin
        components: rustfmt, clippy
    - name: Install Rust x86_64
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: x86_64-apple-darwin
        components: rustfmt, clippy
        
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      continue-on-error: false
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustybits/Cargo.lock') }}
        shared-key: ${{ runner.os }}-cargo-
        workspaces: |
          rustybits/

    - name: Build core ZeroTier
      run: make

    - name: Build GUI
      run: |
        echo "Building GUI with CMake..."
        
        # Create build directory
        mkdir -p build
        cd build
        
        # Configure with CMake
        cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_GUI=ON -DCMAKE_PREFIX_PATH="$(brew --prefix qt6)"
        
        if [ $? -ne 0 ]; then
            echo "CMake configuration failed!"
            exit 1
        fi
        
        # Build the GUI
        cmake --build . --config Release --target zerotier-gui -j$(sysctl -n hw.ncpu)
        
        if [ $? -ne 0 ]; then
            echo "GUI build failed!"
            exit 1
        fi
        
        # Create deploy directory and copy app bundle
        mkdir -p deploy
        if [ -d "gui/zerotier-gui.app" ]; then
            cp -R gui/zerotier-gui.app deploy/ZeroTierOneGUI.app
            echo "GUI app bundle created successfully"
        elif [ -d "gui/Release/zerotier-gui.app" ]; then
            cp -R gui/Release/zerotier-gui.app deploy/ZeroTierOneGUI.app
            echo "GUI app bundle created successfully"
        else
            echo "GUI app bundle not found!"
            find . -name "*.app" -type d
            exit 1
        fi
        
        cd ..

    - name: Package GUI
      run: |
        # Package the app bundle created by build
        if [ -d "build/deploy/ZeroTierOneGUI.app" ]; then
          tar -cvf zerotier-gui-macos.tar build/deploy/ZeroTierOneGUI.app
          echo "Packaged app bundle: build/deploy/ZeroTierOneGUI.app"
        else
          echo "Error: No app bundle found!"
          find build -name "*.app" -type d
          exit 1
        fi

    - name: Archive GUI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zerotier-gui-macos
        path: zerotier-gui-macos.tar
        retention-days: 7
